name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@a5ac7e51b41094c153674e0e265ab8620f0f32fa  # v4
      
    - name: Check if PR is from Dependabot
      id: check-dependabot
      run: |
        if [[ "${{ github.actor }}" == "dependabot[bot]" ]]; then
          echo "is_dependabot=true" >> $GITHUB_OUTPUT
        else
          echo "is_dependabot=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Get PR details
      id: pr-details
      if: steps.check-dependabot.outputs.is_dependabot == 'true'
      env:
        PR_TITLE: ${{ github.event.pull_request.title }}
      run: |
        echo "pr_title=$PR_TITLE" >> $GITHUB_OUTPUT
        
        # Check if it's a patch or minor update
        if [[ "$PR_TITLE" =~ "patch" ]] || [[ "$PR_TITLE" =~ "minor" ]]; then
          echo "auto_merge_eligible=true" >> $GITHUB_OUTPUT
        else
          echo "auto_merge_eligible=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Wait for CI checks
      if: steps.pr-details.outputs.auto_merge_eligible == 'true'
      uses: fountainhead/action-wait-for-check@d0c5e5d63ffd1d4dbc5d50af8355fab86e3e7d3f  # v1.1.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        checkName: "ci-cd"
        ref: ${{ github.event.pull_request.head.sha }}
        timeoutSeconds: 1800
        
    - name: Auto-approve PR
      if: steps.pr-details.outputs.auto_merge_eligible == 'true'
      uses: juliangruber/approve-pull-request-action@c530503d6c3180512dc5214532953382cad4f944  # v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        number: ${{ github.event.pull_request.number }}
        
    - name: Enable auto-merge
      if: steps.pr-details.outputs.auto_merge_eligible == 'true'
      run: |
        gh pr merge ${{ github.event.pull_request.number }} --auto --squash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}