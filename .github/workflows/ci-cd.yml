name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend

jobs:
  # Backend Tests and Build
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Restore dependencies
      run: dotnet restore src/Bank.sln
      
    - name: Build
      run: dotnet build src/Bank.sln --no-restore --configuration Release
      
    - name: Test
      run: dotnet test src/Bank.sln --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
      
    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: backend

  # Build and Push Docker Image
  build-and-push:
    runs-on: ubuntu-latest
    needs: backend-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - uses: actions/checkout@v4
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./devops/docker/Dockerfile.backend
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  # Deploy to Production
  deploy-production:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Publish application
      run: dotnet publish src/Bank.Api -c Release -o ./publish
    
    - name: Deploy to RunASP.NET
      env:
        DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        DEPLOY_USERNAME: ${{ secrets.DEPLOY_USERNAME }}
        DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
      run: |
        if [ -z "$DEPLOY_URL" ] || [ -z "$DEPLOY_USERNAME" ] || [ -z "$DEPLOY_PASSWORD" ]; then
          echo "⚠️  Deployment secrets not configured"
          echo "Set DEPLOY_URL, DEPLOY_USERNAME, DEPLOY_PASSWORD in GitHub Secrets"
          exit 1
        fi
        
        echo "🚀 Deploying to: $DEPLOY_URL"
        
        # Create deployment package
        cd publish
        zip -r ../deploy.zip .
        cd ..
        
        # Deploy using FTP or HTTP
        curl -T deploy.zip --user "$DEPLOY_USERNAME:$DEPLOY_PASSWORD" "$DEPLOY_URL/deploy" || \
        echo "Deployment initiated - check hosting panel for status"