name: Code Quality Analysis

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'  # Daily at 1 AM

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      
    steps:
    - name: Checkout repository
      uses: actions/checkout@a5ac7e51b41094c153674e0e265ab8620f0f32fa  # v4
      
    - name: Initialize CodeQL
      uses: github/codeql-action/init@c7f291ea6ec02c2d6d43f5b0f646470dc06a0170  # v4
      with:
        languages: 'csharp'
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4  # No SHA available for official actions
      with:
        dotnet-version: '9.0.x'
        
    - name: Build .NET project
      run: |
        dotnet restore src/Bank.sln
        dotnet build src/Bank.sln --no-restore
        
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@c7f291ea6ec02c2d6d43f5b0f646470dc06a0170  # v4
      with:
        category: "/language:csharp"