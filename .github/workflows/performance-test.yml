name: Performance Testing

on:
  schedule:
    - cron: '0 3 * * 1'  # Weekly on Monday at 3 AM
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL for performance testing'
        required: true
        default: 'https://bank.yourdomain.com'
      duration:
        description: 'Test duration in minutes'
        required: true
        default: '10'

jobs:
  performance-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Artillery
      run: npm install -g artillery@2.0.0
      
    - name: Create performance test config
      run: |
        cat > performance-test.yml << EOF
        config:
          target: '${{ github.event.inputs.target_url || 'https://bank.yourdomain.com' }}'
          phases:
            - duration: ${{ github.event.inputs.duration || '10' }}
              arrivalRate: 10
              name: "Warm up"
            - duration: ${{ github.event.inputs.duration || '10' }}
              arrivalRate: 50
              name: "Load test"
            - duration: ${{ github.event.inputs.duration || '10' }}
              arrivalRate: 100
              name: "Stress test"
          processor: "./performance-processor.js"
        scenarios:
          - name: "Health Check"
            weight: 20
            flow:
              - get:
                  url: "/health"
                  expect:
                    - statusCode: 200
          - name: "API Authentication"
            weight: 30
            flow:
              - post:
                  url: "/api/auth/login"
                  json:
                    username: "testuser"
                    password: "testpass"
                  capture:
                    - json: "$.token"
                      as: "authToken"
          - name: "Account Operations"
            weight: 50
            flow:
              - get:
                  url: "/api/accounts"
                  headers:
                    Authorization: "Bearer {{ authToken }}"
                  expect:
                    - statusCode: [200, 401]
        EOF
        
    - name: Create performance processor
      run: |
        cat > performance-processor.js << 'EOF'
        module.exports = {
          setAuthToken: function(requestParams, context, ee, next) {
            if (context.vars.authToken) {
              requestParams.headers = requestParams.headers || {};
              requestParams.headers['Authorization'] = 'Bearer ' + context.vars.authToken;
            }
            return next();
          }
        };
        EOF
        
    - name: Run performance tests
      run: |
        artillery run performance-test.yml --output performance-results.json
        
    - name: Generate performance report
      run: |
        artillery report performance-results.json --output performance-report.html
        
    - name: Upload performance results
      uses: actions/upload-artifact@v4
      with:
        name: performance-results
        path: |
          performance-results.json
          performance-report.html
          
    - name: Performance threshold check
      run: |
        # Extract key metrics from results
        RESPONSE_TIME_P95=$(cat performance-results.json | jq '.aggregate.latency.p95')
        ERROR_RATE=$(cat performance-results.json | jq '.aggregate.counters."http.codes.4xx" // 0')
        
        echo "95th percentile response time: ${RESPONSE_TIME_P95}ms"
        echo "Error rate: ${ERROR_RATE}"
        
        # Set thresholds for banking application
        MAX_RESPONSE_TIME=2000  # 2 seconds
        MAX_ERROR_RATE=1        # 1% error rate
        
        if (( $(echo "$RESPONSE_TIME_P95 > $MAX_RESPONSE_TIME" | bc -l) )); then
          echo "❌ Performance test failed: Response time too high"
          exit 1
        fi
        
        if (( ERROR_RATE > MAX_ERROR_RATE )); then
          echo "❌ Performance test failed: Error rate too high"
          exit 1
        fi
        
        echo "✅ Performance test passed"