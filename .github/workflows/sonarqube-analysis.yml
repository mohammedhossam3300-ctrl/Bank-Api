name: SonarQube Analysis
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Cache SonarCloud packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
        
    - name: Install SonarCloud scanner
      run: |
        dotnet tool install --global dotnet-sonarscanner
        
    - name: Build and analyze
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
          echo "⚠️  SONAR_TOKEN not configured. Skipping SonarCloud analysis."
          echo "To enable: Add SONAR_TOKEN to GitHub repository secrets"
          dotnet restore src/Bank.sln
          dotnet build src/Bank.sln --no-restore --configuration Release
        else
          dotnet sonarscanner begin /k:"Bank-Api" /o:"mostafa-said7" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.qualitygate.wait=false
          dotnet restore src/Bank.sln
          dotnet build src/Bank.sln --no-restore --configuration Release
          dotnet test src/Bank.sln --no-build --configuration Release --verbosity normal /p:CollectCoverage=true /p:CoverageFormat=opencover
          dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        fi