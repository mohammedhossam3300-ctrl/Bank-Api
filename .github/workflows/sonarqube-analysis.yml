name: SonarQube Analysis
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@a5ac7e51b41094c153674e0e265ab8620f0f32fa  # v4
      with:
        fetch-depth: 0
        
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
        
    - name: Cache SonarCloud packages
      uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9  # v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar
        restore-keys: ${{ runner.os }}-sonar
        
    - name: Install SonarCloud scanner
      run: |
        dotnet tool install --global dotnet-sonarscanner
        
    - name: Check SonarCloud Token
      id: check-sonar
      run: |
        if [ -z "$SONAR_TOKEN" ]; then
          echo "has_token=false" >> $GITHUB_OUTPUT
        else
          echo "has_token=true" >> $GITHUB_OUTPUT
        fi
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
    - name: Build and analyze (SonarCloud disabled)
      if: steps.check-sonar.outputs.has_token == 'false'
      run: |
        echo "⚠️  SONAR_TOKEN not configured. Skipping SonarCloud analysis."
        echo "To enable: Add SONAR_TOKEN to GitHub repository secrets"
        dotnet restore src/Bank.sln
        dotnet build src/Bank.sln --no-restore --configuration Release
    
    - name: Build and analyze (SonarCloud enabled)
      if: steps.check-sonar.outputs.has_token == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      run: |
        dotnet sonarscanner begin /k:"Bank-Api" /o:"mostafa-said7" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.qualitygate.wait=false /d:sonar.sources="src" /d:sonar.exclusions="**/bin/**,**/obj/**,**/*.Tests/**,**/test/**,**/*.Designer.cs,**/*.g.cs" /d:sonar.coverage.exclusions="**/bin/**,**/obj/**,**/*.Tests/**,**/test/**"
        dotnet restore src/Bank.sln
        dotnet build src/Bank.sln --no-restore --configuration Release
        dotnet test src/Bank.sln --no-build --configuration Release --verbosity normal /p:CollectCoverage=true /p:CoverageFormat=opencover
        dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
        echo "✅ SonarCloud analysis completed"
        echo "📊 View results at: https://sonarcloud.io/dashboard?id=Bank-Api"