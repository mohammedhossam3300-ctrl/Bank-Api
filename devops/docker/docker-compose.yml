version: '3.8'

services:
  # Database
  database:
    image: postgres:16
    container_name: bank-database
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-ChangeMe!Secure123}
      - POSTGRES_DB=${DB_NAME:-bankdb}
    ports:
      - "5432:5432"
    volumes:
      - bank_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - bank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-bankdb}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../..
      dockerfile: devops/docker/Dockerfile.backend
    container_name: bank-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-ChangeMe!Secure123}@database:5432/${DB_NAME:-bankdb}
      - JwtSettings__SecretKey=${JWT_KEY:-your-secret-jwt-key-change-in-production}
      - JwtSettings__Issuer=${JWT_ISSUER:-BankAPI}
      - JwtSettings__Audience=${JWT_AUDIENCE:-BankClients}
      - JwtSettings__ExpirationMinutes=${JWT_EXPIRATION:-60}
    ports:
      - "5000:5000"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - bank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: bank-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  bank_data:
    driver: local
  redis_data:
    driver: local

networks:
  bank-network:
    driver: bridge
