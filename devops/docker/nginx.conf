events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    server {
        listen 80;
        server_name $http_host;
        root /usr/share/nginx/html;
        index index.html;

        # ── Security headers applied globally on every response ──────────────
        # All headers defined here at the server block level. Do NOT redefine
        # them inside location blocks — a location-level add_header silently
        # drops every server-block add_header directive (nginx inheritance rule).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "0" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

        # Handle Angular / SPA routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # API reverse proxy
        # H2C smuggling fix: only forward the Upgrade header when it is a
        # WebSocket upgrade. Any other value is stripped to prevent protocol
        # confusion attacks. proxy_http_version 1.1 is kept to support WS.
        location /api/ {
            # Strip non-WebSocket Upgrade headers before forwarding
            set $upgrade_header "";
            if ($http_upgrade = "websocket") {
                set $upgrade_header $http_upgrade;
            }

            proxy_pass http://backend:5000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $upgrade_header;
            proxy_set_header Connection "";
            proxy_set_header Host $server_name;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Do not forward these risk headers downstream
            proxy_hide_header X-Powered-By;
            proxy_hide_header Server;
        }

        # Static asset caching — no security header re-definition here to
        # avoid the nginx inheritance drop of server-block headers.
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            # Re-declare all security headers because this location block
            # must include them explicitly (nginx drops server-block headers
            # when a location block adds any header of its own).
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "0" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        }

        # Health check — no access log, minimal response
        location = /health {
            access_log off;
            add_header Content-Type text/plain always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            return 200 "healthy\n";
        }
    }
}
