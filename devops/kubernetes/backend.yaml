apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: bank-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend
      automountServiceAccountToken: false
      containers:
      - name: backend
        image: ghcr.io/yourusername/bank-management-system/backend:latest
        ports:
        - containerPort: 80
        env:
        - name: ASPNETCORE_ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: bank-config
              key: ASPNETCORE_ENVIRONMENT
        - name: ConnectionStrings__DefaultConnection
          valueFrom:
            secretKeyRef:
              name: bank-secrets
              key: ConnectionStrings__DefaultConnection
        - name: JwtSettings__SecretKey
          valueFrom:
            secretKeyRef:
              name: bank-secrets
              key: JwtSettings__SecretKey
        - name: JwtSettings__Issuer
          valueFrom:
            configMapKeyRef:
              name: bank-config
              key: JwtSettings__Issuer
        - name: JwtSettings__Audience
          valueFrom:
            configMapKeyRef:
              name: bank-config
              key: JwtSettings__Audience
        - name: JwtSettings__ExpirationMinutes
          valueFrom:
            configMapKeyRef:
              name: bank-config
              key: JwtSettings__ExpirationMinutes
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
            ephemeralStorage: "1Gi"
          limits:
            memory: "512Mi"
            cpu: "500m"
            ephemeralStorage: "2Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend
  namespace: bank-app
automountServiceAccountToken: false
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: bank-app
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: bank-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80