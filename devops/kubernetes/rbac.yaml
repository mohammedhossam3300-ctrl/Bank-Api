---
# RBAC configuration for Bank Management System
# This file defines roles and role bindings for fine-grained access control

# Backend service account (already defined in backend.yaml with automountServiceAccountToken: false)
# If the backend needs to access the Kubernetes API, uncomment the Role and RoleBinding below

# Role: Backend - Minimal permissions needed by backend pod
# Currently: No permissions (empty role) - uncomment below if needed
#apiVersion: rbac.authorization.k8s.io/v1
#kind: Role
#metadata:
#  name: backend
#  namespace: bank-app
#rules:
#  # Example: If backend needs to read ConfigMaps
#  # - apiGroups: [""]
#  #   resources: ["configmaps"]
#  #   verbs: ["get", "list", "watch"]
#  #   resourceNames: ["bank-config"]  # Restrict to specific ConfigMap
#  
#  # Example: If backend needs to read Secrets
